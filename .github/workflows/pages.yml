name: Deploy registry to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege for Pages deploy via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a newer push supersede an older run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Regenerate the registry from source so the served files are always
      # canonical (a true drift gate — regenerate + git diff — lands in M2).
      - run: npm run registry:bundle
      - run: npm run build-storybook
      - name: Assemble the static site
        run: |
          rm -rf _site
          mkdir -p _site/r
          cp -r public/r/. _site/r/
          cp registry.json _site/registry.json
          cp llms.txt _site/llms.txt
          cp MAPPING.md _site/MAPPING.md
          cp -r manifests _site/manifests
          cp README.md _site/README.md
          cp design.md _site/design.md
          mkdir -p _site/docs/components
          cp -r docs/components/. _site/docs/components/
          mkdir -p _site/storybook
          cp -r storybook-static/. _site/storybook/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
