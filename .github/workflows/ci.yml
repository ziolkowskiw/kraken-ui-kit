name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Validate manifests (schemas + drift + cross-checks)
        run: npm run manifests:check

      - name: Drift gate — generated files must match their sources
        run: |
          npm run tokens:build
          npm run registry:bundle
          npm run manifests:build
          npm run docs:build
          git diff --exit-code -- \
            src/styles/tokens.css \
            registry.json \
            public/r \
            manifests \
            docs/components \
            README.md

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build (Next)
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

  story-tests:
    # Non-blocking: visible on the PR, never fails the required check.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Story render + a11y (non-blocking)
        run: npm test
